workflows:
  ios-workflow:
    name: iOS Workflow

    environment:
      node: latest
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build web app
        script: |
          npm run build

      - name: Sync Capacitor
        script: |
          npx cap sync ios

     - name: Build iOS app
  script: |
    xcodebuild \
    -project ios/App/App.xcodeproj \
    -scheme App \
    -sdk iphoneos \
    -configuration Release \
    archive \
    -archivePath build/App.xcarchive

    artifacts:
      - build/**/*.ipa